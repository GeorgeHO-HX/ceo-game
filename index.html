function drawCEOPerson(g,cx,cy,s,suit,skin,hair){
  g.fillStyle(0x050505);g.fillRect(cx-5*s,cy-s,10*s,11*s);g.fillRect(cx-4*s,cy-7*s,8*s,8*s);
  g.fillStyle(0x222233);g.fillRect(cx-3*s,cy+8*s,2*s,5*s);g.fillRect(cx+s,cy+8*s,2*s,5*s);
  g.fillStyle(suit);g.fillRect(cx-4*s,cy,8*s,9*s);
  g.fillStyle(0xFFFFFF);g.fillRect(cx-s,cy+s,2*s,2*s);
  g.fillStyle(C.orange);g.fillRect(cx-s,cy+3*s,2*s,4*s);
  g.fillStyle(skin);g.fillRect(cx-3*s,cy-6*s,6*s,6*s);
  g.fillStyle(hair);g.fillRect(cx-3*s,cy-9*s,6*s,4*s);g.fillRect(cx-4*s,cy-6*s,s,3*s);
  g.fillStyle(0);g.fillRect(cx-2*s,cy-4*s,s,s);g.fillRect(cx+s,cy-4*s,s,s);
  g.fillRect(cx-s,cy-2*s,3*s,s);
}

function plantAt(g,x,y){
  // Blocky pixel plant: no circles, just square clumps.
  g.fillStyle(C.pot);g.fillRect(x-8,y,16,12);
  g.fillStyle(0xA06030);g.fillRect(x-6,y+12,12,4);
  g.fillStyle(C.leafDk);
  g.fillRect(x-12,y-10,8,8);g.fillRect(x+4,y-10,8,8);g.fillRect(x-6,y-18,12,10);
  g.fillStyle(C.leafLt);
  g.fillRect(x-10,y-18,8,8);g.fillRect(x+2,y-20,10,8);g.fillRect(x-3,y-27,8,8);
  g.fillStyle(0x1F4F1F);g.fillRect(x-2,y-13,4,13);
}

// ═══════════════════════════════════════════════════════
//  EMPLOYEE  (animated pixel-art character)
// ═══════════════════════════════════════════════════════
class Employee{
  constructor(scene,id,x,y){
    this.scene=scene; this.id=id;
    this.x=x; this.y=y; this.tx=x; this.ty=y;
    this.happiness=70; this.productivity=70;
    this.isLeaving=false; this.departed=false;
    this.type=EMP_T[id%EMP_T.length];
    this.empName=EMP_NAMES[id%EMP_NAMES.length];
    this.facingLeft=false;
    this.walkClock=Math.random()*Math.PI*2; // randomise walk phase
    this.stuckTimer=0; this.lastX=x; this.lastY=y;
    this.blockedUntil=0;
    this.waypoints=[]; // door-gap waypoints for crossing the divider wall

    // ── Physics rectangle (invisible, drives collision) ──
    this.body=scene.add.rectangle(x,y,14,22,0,0).setVisible(false);
    scene.physics.add.existing(this.body,false);
    this.body.body.setCollideWorldBounds(true);
    this.body.body.setMaxVelocity(180,180);
    this.body.empRef=this; // back-ref for collider callbacks

    // ── Visual container ──
    this.cnt=scene.add.container(x,y).setDepth(5);
    const t=this.type, s=2;

    // Shadow
    this.shadow=scene.add.ellipse(0,18,20,8,0x000000,0.25);

    // Separate limb graphics for walk animation
    this.legL=scene.add.graphics(); this._drawLeg(this.legL,-4,s,t);
    this.legR=scene.add.graphics(); this._drawLeg(this.legR, 1,s,t);
    this.armL=scene.add.graphics(); this._drawArm(this.armL,-7,s,t);
    this.armR=scene.add.graphics(); this._drawArm(this.armR, 5,s,t);

    // Static body + head
    this.torsoG=scene.add.graphics();
    this._drawTorso(this.torsoG,s,t);
    this.headG=scene.add.graphics();
    this._drawHead(this.headG,s,t);
    this.faceG=scene.add.graphics();
    this._drawFace(this.faceG,s,this.happiness);

    this.iconT=scene.add.text(0,-34,'',{fontSize:'11px'}).setOrigin(0.5);

    // Shadow lives outside the container so setPosition sets world coords correctly
    // Layer order: legs (behind), arms (behind), torso, head, face, icon
    this.cnt.add([this.legL,this.legR,this.armL,this.armR,
                  this.torsoG,this.headG,this.faceG,this.iconT]);
  }

  _drawLeg(g,lx,s,t){
    g.clear();
    g.fillStyle(t.tr);  g.fillRect(lx*s,8*s,3*s,6*s);
    g.fillStyle(0x111111); g.fillRect((lx-1)*s,13*s,4*s,2*s);
  }
  _drawArm(g,ax,s,t){
    g.clear();
    g.fillStyle(t.suit); g.fillRect(ax*s,s,2*s,6*s);
    g.fillStyle(t.skin); g.fillRect(ax*s,6*s,2*s,3*s);
  }
  _drawTorso(g,s,t){
    g.clear();
    g.fillStyle(t.suit); g.fillRect(-5*s,0,10*s,9*s);
    g.fillStyle(0xFFFFFF); g.fillRect(-s,0,2*s,2*s);
    g.fillStyle(t.tie);   g.fillRect(-s,2*s,2*s,5*s);
  }
  _drawHead(g,s,t){
    g.clear();
    g.fillStyle(t.skin); g.fillRect(-4*s,-8*s,8*s,8*s);
    g.fillStyle(t.hair);
    if(t.hs==='short'){
      g.fillRect(-4*s,-10*s,8*s,3*s);
      g.fillRect(-5*s,-8*s,s,4*s); g.fillRect(4*s,-8*s,s,4*s);
    }else if(t.hs==='long'){
      g.fillRect(-4*s,-10*s,8*s,3*s);
      g.fillRect(-5*s,-8*s,s,9*s); g.fillRect(4*s,-8*s,s,9*s);
    }else if(t.hs==='bun'){
      g.fillRect(-4*s,-10*s,8*s,3*s);
      g.fillRect(-5*s,-8*s,s,4*s); g.fillRect(4*s,-8*s,s,4*s);
      g.fillRect(-s,-13*s,4*s,4*s);
    }else if(t.hs==='ponytail'){
      g.fillRect(-4*s,-10*s,8*s,3*s);
      g.fillRect(-5*s,-8*s,s,5*s);
      g.fillRect(4*s,-9*s,2*s,11*s);
    }
    // Ears
    g.fillStyle(t.skin); g.fillRect(-5*s,-5*s,s,3*s); g.fillRect(4*s,-5*s,s,3*s);
  }
  _drawFace(g,s,h){
    g.clear();
    g.fillStyle(0x000000);
    // Eyes
    g.fillRect(-3*s,-5*s,2*s,2*s); g.fillRect(s,-5*s,2*s,2*s);
    if(h>=80){
      // Big grin
      g.fillRect(-3*s,-2*s,6*s,2*s);
      g.fillRect(-2*s,-1*s,s,s); g.fillRect(s,-1*s,s,s);
    }else if(h>=50){
      g.fillRect(-2*s,-2*s,5*s,s);
    }else if(h>=25){
      g.fillRect(-2*s,-s,5*s,s);
    }else{
      // Sad + tears
      g.fillRect(-2*s,0,5*s,s);
      g.fillRect(-3*s,-s,s,s); g.fillRect(2*s,-s,s,s);
      g.fillStyle(0x66AAFF);
      g.fillRect(-3*s,-3*s,s,3*s); g.fillRect(2*s,-3*s,s,3*s);
    }
  }

  redrawFace(){
    this._drawFace(this.faceG,2,this.happiness);
    this.iconT.setText(this.happiness>=80?'✨':this.happiness<20?'😢':'');
  }

  applyEffect(hd,pd){
    this.happiness=Phaser.Math.Clamp(this.happiness+hd,0,100);
    this.productivity=Phaser.Math.Clamp(this.productivity+pd,0,100);
    this.redrawFace();
    this.scene.tweens.add({targets:this.torsoG,alpha:0.3,duration:120,yoyo:true});
  }

  setTarget(tx,ty){
    const inLeft=this.body.x<196;
    const goRight=tx>212;
    const goLeft=tx<192;
    const routeVia=(points)=>{
      const usable=points.filter(p=>Math.hypot(p.x-this.body.x,p.y-this.body.y)>10);
      if(usable.length===0){
        this.waypoints=[];
        this.tx=tx; this.ty=ty;
        return;
      }
      const first=usable.shift();
      this.waypoints=usable;
      this.tx=first.x; this.ty=first.y;
    };

    // Crossing the divider wall — route through nearest door gap first
    if((inLeft&&goRight)||(!inLeft&&goLeft)){
      const doorY=Math.abs(this.body.y-210)<Math.abs(this.body.y-380)?210:380;
      const doorX=inLeft?196:212;
      routeVia([{x:doorX,y:this.body.y},{x:doorX,y:doorY},{x:tx,y:doorY},{x:tx,y:ty}]);
      return;
    }

    // Carpet-zone navigation — route via clear vertical lanes to avoid desks
    // Lanes: x=22 (left of col1), x=107 (between cols), x=182 (right of col2)
    const LANES=[22,107,182];
    if(tx<196 && this.body.x<196){
      const bestLane=LANES.reduce((b,lx)=>Math.abs(lx-tx)<Math.abs(b-tx)?lx:b);
      routeVia([{x:bestLane,y:this.body.y},{x:bestLane,y:ty},{x:tx,y:ty}]);
      return;
    }

    if(tx>212 && this.body.x>212){
      const rightLanes=[224,GW-22];
      const bestLane=rightLanes.reduce((b,lx)=>Math.abs(lx-tx)<Math.abs(b-tx)?lx:b);
      routeVia([{x:bestLane,y:this.body.y},{x:bestLane,y:ty},{x:tx,y:ty}]);
      return;
    }

    this.waypoints=[];
    this.tx=tx; this.ty=ty;
  }

  startLeaving(){
    this.isLeaving=true; this.iconT.setText('🚪');
    this.tx=GW+90; this.ty=this.y;
  }

  _animateLimbs(time,moving){
    if(!moving){
      this.legL.y=this.legR.y=this.armL.y=this.armR.y=0;
      this.legL.rotation=this.legR.rotation=0;
      return;
    }
    this.walkClock+=0.18;
    const sw=Math.sin(this.walkClock)*5;
    this.legL.y=sw;   this.legR.y=-sw;
    this.armL.y=-sw*0.5; this.armR.y=sw*0.5;
    this.legL.rotation=sw*0.06; this.legR.rotation=-sw*0.06;
  }

  update(time,delta){
    if(this.departed)return true;
    const dx=this.tx-this.body.x, dy=this.ty-this.body.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=(this.isLeaving?120:(40+(this.productivity/100)*90+(this.happiness/100)*30));
    const moving=dist>12;

    // Advance to next waypoint when close enough
    if(dist<=18&&this.waypoints.length>0){
      const next=this.waypoints.shift();
      this.tx=next.x; this.ty=next.y;
    }

    if(moving){
      this.body.body.setVelocity((dx/dist)*spd,(dy/dist)*spd);
      this.facingLeft=dx<0;
    }else{
      this.body.body.setVelocity(0,0);
    }

    // Flip direction
    this.cnt.scaleX=this.facingLeft?-1:1;
    // Keep icon readable even when flipped
    this.iconT.scaleX=this.facingLeft?-1:1;

    // Animate limbs
    this._animateLimbs(time,moving);

    // Sync visual to physics body
    this.x=this.body.x; this.y=this.body.y;
    this.cnt.x=this.body.x; this.cnt.y=this.body.y;
    this.shadow.setPosition(this.body.x,this.body.y+18);

    // Stuck detection — check every 1.5s, recover by clearing waypoints and picking safe target
    this.stuckTimer+=delta;
    if(this.stuckTimer>1500){
      this.stuckTimer=0;
      const dd=Math.hypot(this.body.x-this.lastX,this.body.y-this.lastY);
      if(dd<6&&moving){
        this.waypoints=[];
        // Retreat into the nearest clear lane
        const lane=this.scene._safeLaneFor?this.scene._safeLaneFor(this.body.x):107;
        this.tx=lane;
        this.ty=Phaser.Math.Clamp(this.body.y+Phaser.Math.Between(-34,34),HUD_H+52,GH-92);
      }
      this.lastX=this.body.x; this.lastY=this.body.y;
    }

    if(this.isLeaving&&this.body.x>GW+60){ this._vanish(); return true; }
    return false;
  }

  _vanish(){
    this.departed=true;
    this.scene.tweens.add({targets:[this.cnt,this.shadow],alpha:0,scaleX:0,scaleY:0,
      duration:300,ease:'Back.easeIn',
      onComplete:()=>{this.cnt.destroy(true);this.shadow.destroy();this.body.destroy();}});
  }
}

    this.selIdx=0; this.cards=[];
    AVATARS.forEach((av,i)=>{
      const cx=i%2===0?W*0.27:W*0.73, cy=272+Math.floor(i/2)*155;
      const c=this.add.container(cx,cy);
      const bg=this.add.rectangle(0,0,140,138,C.darkMid).setInteractive();
      const bd=this.add.rectangle(0,0,140,138); bd.setStrokeStyle(3,i===0?C.orange:0x333355);
      const avG=this.add.graphics(); drawCEOPerson(avG,0,-20,3,av.suit,av.skin,av.hair);
      const nt=this.add.text(0,40,av.name,{fontFamily:"'Press Start 2P'",fontSize:'7px',color:'#FFF',wordWrap:{width:120},align:'center'}).setOrigin(0.5);
      c.add([bg,bd,avG,nt]);
      bg.on('pointerdown',()=>{
        this.selIdx=i;
        this.cards.forEach((card,j)=>card.bd.setStrokeStyle(3,j===i?C.orange:0x333355));
        this.tweens.add({targets:c,scaleX:1.06,scaleY:1.06,duration:90,yoyo:true});
      });
      bg.on('pointerover',()=>bg.setFillStyle(0x222240));
      bg.on('pointerout',()=>bg.setFillStyle(C.darkMid));
      this.cards.push({bd});
    });
    const btn=this.add.rectangle(W/2,H-75,260,52,C.orange).setInteractive();
    this.add.text(W/2,H-75,'▶  START GAME',{fontFamily:"'Press Start 2P'",fontSize:'12px',color:'#FFF'}).setOrigin(0.5).setDepth(1);
    this.tweens.add({targets:btn,alpha:0.75,duration:900,yoyo:true,repeat:-1});
    btn.on('pointerdown',()=>this.scene.start('Game',{avatarIndex:this.selIdx}));
    btn.on('pointerover',()=>btn.setFillStyle(C.orangeLt));
    btn.on('pointerout',()=>btn.setFillStyle(C.orange));
    this.add.rectangle(W/2,H-16,W,32,C.darkMid);
    this.add.text(W/2,H-16,'10 DECISIONS  ·  BUILD THE BEST WORKPLACE!',{fontFamily:"'Press Start 2P'",fontSize:'5px',color:'#444466'}).setOrigin(0.5);
  }
}

// ═══════════════════════════════════════════════════════
//  GAME SCENE
// ═══════════════════════════════════════════════════════
class GameScene extends Phaser.Scene{
  constructor(){super('Game')}
  init(d){this.avatarIndex=d.avatarIndex||0}

  create(){
    this.timeLeft=GAME_DURATION; this.qTimer=Q_INTERVAL;
    this.qIndex=0; this.qPool=[...QS];
    this.employees=[]; this.qActive=false; this.over=false;
    this.totalH=0; this.totalP=0; this.samples=0;
    this.workerCooldown=0; this.workerActive=false;
    this.curMaxEmp=BASE_EMP; this.activeDeskCount=BASE_EMP;
    this.goodChoices=0; this.badChoices=0; this.choiceResults=[]; this.unlockedThemes={};

    this.deskPool=this._buildDeskPool();
    this._buildOffice();
    this._buildDeskColliders();
    this._spawnEmployees();
    this._buildHUD();
    this._buildCEO();

    // Employee ↔ desk collision
    this.physics.add.collider(this.empGroup,this.deskStatic,this._onEmployeeBlocked,null,this);
    // Employee ↔ employee (soft separation)
    this.physics.add.collider(this.empGroup,this.empGroup);

    this.time.addEvent({delay:3500,loop:true,callback:this._redistribute,callbackScope:this});
    this.time.addEvent({delay:1000,loop:true,callback:this._tick,callbackScope:this});
  }

  // ── DESK POSITIONS ─────────────────────────────────
  _buildDeskPool(){
    const OY=HUD_H;
    return[
      // 8 base desks — left carpet zone (2 col × 4 row)
      // Col1=65, Col2=150 — desk bodies are 40px wide so corridors are:
      // left(25px), centre(65px→85 to 130), right(200-170=30px)
      {x:65, y:OY+62}, {x:150,y:OY+62},
      {x:65, y:OY+148},{x:150,y:OY+148},
      {x:65, y:OY+234},{x:150,y:OY+234},
      {x:65, y:OY+320},{x:150,y:OY+320},
      // 4 expansion desks
      {x:65, y:OY+406},{x:150,y:OY+406},
      {x:65, y:OY+492},{x:150,y:OY+492},
    ];
  }

  // ── COLLISION BODIES FOR DESKS ─────────────────────
  _buildDeskColliders(){
    this.deskStatic=this.physics.add.staticGroup();
    for(let i=0;i<this.activeDeskCount;i++){
      const {x,y}=this.deskPool[i];
      // Narrow body covers only the desk surface — keeps corridors wide enough to walk through
      const b=this.add.rectangle(x,y-2,40,26,0,0).setVisible(false);
      this.physics.add.existing(b,true);
      this.deskStatic.add(b);
    }
    // Meeting table blocker
    const mt=this.add.rectangle(302,HUD_H+113,60,60,0,0).setVisible(false);
    this.physics.add.existing(mt,true);
    this.deskStatic.add(mt);
    // Divider wall — 3 segments with door gaps at y=185–235 and y=355–405
    const OYc=HUD_H, offHc=GH-HUD_H-65;
    [[OYc+44,185],[235,355],[405,OYc+offHc-4]].forEach(([y1,y2])=>{
      const h=y2-y1, seg=this.add.rectangle(204,y1+h/2,8,h,0,0).setVisible(false);
      this.physics.add.existing(seg,true); this.deskStatic.add(seg);
    });
  }

  _safeLaneFor(x){
    const lanes=x>212?[224,GW-22]:[22,107,182];
    return lanes.reduce((b,lx)=>Math.abs(lx-x)<Math.abs(b-x)?lx:b);
  }

  _onEmployeeBlocked(bodyObj){
    const emp=bodyObj.empRef;
    if(!emp||emp.departed||emp.isLeaving)return;
    if(this.time.now<emp.blockedUntil)return;
    emp.blockedUntil=this.time.now+450;
    const lane=this._safeLaneFor(emp.body.x);
    const nudgeY=Phaser.Math.Clamp(emp.body.y+Phaser.Math.Between(-34,34),HUD_H+52,GH-92);
    emp.waypoints=[];
    emp.tx=lane;
    emp.ty=nudgeY;
    emp.body.body.setVelocity(0,0);
  }

  // ── OFFICE VISUALS ─────────────────────────────────
  _buildOffice(){
    const W=GW,H=GH,OY=HUD_H,offH=H-OY-65;

    // ── Base walls ──
    const walls=this.add.graphics().setDepth(0);
    walls.fillStyle(C.wallPaint); walls.fillRect(0,OY,W,offH);
    walls.fillStyle(C.skirting);
    walls.fillRect(0,OY,W,5);
    walls.fillRect(0,OY,5,offH);
    walls.fillRect(W-5,OY,5,offH);
    walls.fillRect(0,H-65-5,W,5);

    // ── Windows (top wall, 3 panes) ──
    [[32,OY+5],[140,OY+5],[248,OY+5]].forEach(([wx,wy])=>{
      walls.fillStyle(C.winFrame); walls.fillRect(wx,wy,56,38);
      walls.fillStyle(C.winGlass); walls.fillRect(wx+3,wy+3,50,32);
      walls.fillStyle(C.winGlassLt);
      walls.fillRect(wx+4,wy+4,22,14); walls.fillRect(wx+29,wy+4,20,14);
      walls.fillStyle(C.winFrame);
      walls.fillRect(wx+28,wy+3,2,32); walls.fillRect(wx+3,wy+20,50,2);
    });

    // ── Vertical room-divider wall — drawn in 3 sections with 2 door gaps ──
    // Door 1: y=185-235 (enters meeting room)   Door 2: y=355-405 (enters break room)
    const drawWallSeg=(y1,y2)=>{
      walls.fillStyle(C.wallDark); walls.fillRect(200,y1,8,y2-y1);
      walls.fillStyle(C.skirting); walls.fillRect(200,y1,8,4);
    };
    drawWallSeg(OY+44, 185);  // top section
    drawWallSeg(235,   355);  // middle section
    drawWallSeg(405,   OY+offH-4); // bottom section

    // Door frames
    const drawDoorFrame=(dy)=>{
      walls.fillStyle(C.doorDk);
      walls.fillRect(198,dy,4,4); walls.fillRect(198,dy+46,4,4); // lintels
      walls.fillStyle(C.doorCol);
      walls.fillRect(200,dy,2,50); // door leaf (ajar)
    };
    drawDoorFrame(185); drawDoorFrame(355);

    // ── Blue-grey CARPET (left zone) ──
    const carpet=this.add.graphics().setDepth(1);
    carpet.fillStyle(C.carpet); carpet.fillRect(6,OY+44,193,offH-48);
    for(let cy=OY+48;cy<H-68;cy+=18){
      carpet.fillStyle(C.carpetDk,0.25); carpet.fillRect(6,cy,193,2);
    }
    // Carpet border
    carpet.lineStyle(2,C.carpetDk,0.5);
    carpet.strokeRect(6,OY+44,193,offH-48);

    // ── Cream floor tiles (right zone) ──
    const floor=this.add.graphics().setDepth(1);
    for(let tx=208;tx<W-4;tx+=24)for(let ty=OY+44;ty<H-66;ty+=24){
      floor.fillStyle(C.floor); floor.fillRect(tx+1,ty+1,22,22);
      floor.fillStyle(C.floorGrid); floor.fillRect(tx,ty,24,1);floor.fillRect(tx,ty,1,24);
    }

    // ── RIGHT-TOP: Meeting Room ──
    this._buildMeetingRoom(208,OY+44,W-213,180);

    // ── RIGHT-BOTTOM: Break Room ──
    this._buildBreakRoom(208,OY+230,W-213,offH-234);
    this._buildThemeBits();

    // ── Base desks (8) ──
    this.deskLayer=this.add.graphics().setDepth(2);
    for(let i=0;i<BASE_EMP;i++) this._drawDeskAt(this.deskLayer,this.deskPool[i].x,this.deskPool[i].y,false);

    // ── Expansion desk slots (hidden) ──
    this.expDeskLayers=[];
    for(let i=BASE_EMP;i<this.deskPool.length;i++){
      const eg=this.add.graphics().setDepth(2).setAlpha(0);
      this._drawDeskAt(eg,this.deskPool[i].x,this.deskPool[i].y,false);
      this.expDeskLayers.push(eg);
    }

    // ── Filing cabinet (right wall) ──
    const cab=this.add.graphics().setDepth(2);
    this._drawFilingCabinet(cab,W-22,OY+62);
    this._drawFilingCabinet(cab,W-22,OY+140);

    // ── Plants ──
    const pl=this.add.graphics().setDepth(3);
    [[10,OY+44],[10,H-100],[W-18,OY+44],[W-18,H-105],[100,H-90]].forEach(([px,py])=>plantAt(pl,px,py));

    // Employee physics group
    this.empGroup=this.physics.add.group();

    // Wander zones for AI targeting (avoids desk area)
    this.wanderZones=[
      {x:105,y:HUD_H+400},{x:105,y:HUD_H+450},{x:60,y:HUD_H+400},
      {x:260,y:HUD_H+350},{x:300,y:HUD_H+280},{x:310,y:HUD_H+440},
    ];
  }

  _buildMeetingRoom(rx,ry,rW,rH){
    const g=this.add.graphics().setDepth(2);
    // Room floor (slightly warmer)
    g.fillStyle(0xDDD5C0); g.fillRect(rx,ry,rW,rH);
    for(let tx=rx;tx<rx+rW;tx+=20)for(let ty=ry;ty<ry+rH;ty+=20){
      g.fillStyle(0xCCC5B0);g.fillRect(tx,ty,20,1);g.fillRect(tx,ty,1,20);
    }
    this.add.text(rx+rW/2,ry+6,'MEETING ROOM',{fontFamily:"'Press Start 2P'",fontSize:'5px',color:'#887766'}).setOrigin(0.5,0).setDepth(3);

    // Round table (centre of room)
    const tx=rx+rW/2, ty=ry+rH/2+5;
    g.fillStyle(C.tableDark); g.fillCircle(tx,ty,34);
    g.fillStyle(C.tableRound); g.fillCircle(tx,ty,30);
    g.fillStyle(0xEEAA60,0.35); g.fillCircle(tx-8,ty-8,14);

    // Notepads
    [[tx-20,ty-10],[tx+8,ty+8],[tx-4,ty-20]].forEach(([nx,ny])=>{
      g.fillStyle(0xFFFFF0);g.fillRect(nx,ny,11,15);
      g.fillStyle(0xCCCCBB);[3,6,9].forEach(d=>{g.fillRect(nx+1,ny+d,9,1);});
      g.fillStyle(0xFF6600);g.fillRect(nx+8,ny+2,2,2);
    });

    // Chairs around table (6)
    const angles=[0,60,120,180,240,300];
    angles.forEach(a=>{
      const rad=Phaser.Math.DegToRad(a);
      const cx=tx+Math.cos(rad)*44, cy=ty+Math.sin(rad)*44;
      g.fillStyle(C.chairDark); g.fillCircle(cx,cy,10);
      g.fillStyle(C.chairSeat); g.fillCircle(cx,cy,8);
      // Chair back indicator
      g.fillStyle(C.chairDark);
      g.fillRect(cx+Math.cos(rad)*7-3,cy+Math.sin(rad)*7-3,6,6);
    });

    this.mtgSeats=angles.map(a=>{
      const rad=Phaser.Math.DegToRad(a);
      return{x:tx+Math.cos(rad)*44,y:ty+Math.sin(rad)*44};
    });
  }

  _buildBreakRoom(rx,ry,rW,rH){
    const g=this.add.graphics().setDepth(2);
    // Warm wood floor
    g.fillStyle(C.woodFloor); g.fillRect(rx,ry,rW,rH);
    for(let bx=rx;bx<rx+rW;bx+=32)for(let by=ry;by<ry+rH;by+=12){
      g.fillStyle(by%24===0?C.woodDk:C.woodFloor);g.fillRect(bx,by,31,11);
    }
    this.add.text(rx+rW/2,ry+8,'BREAK ROOM',{fontFamily:"'Press Start 2P'",fontSize:'5px',color:'#887744'}).setOrigin(0.5,0).setDepth(3);

    // Ping pong table
    const ptx=rx+rW/2, pty=ry+rH/2+12;
    g.fillStyle(0x111111); g.fillRect(ptx-44,pty-23,88,46);
    g.fillStyle(C.pingBlue); g.fillRect(ptx-42,pty-21,84,42);
    g.fillStyle(0xFFFFFF);
    g.fillRect(ptx-1,pty-21,2,42); // net
    g.fillRect(ptx-42,pty-1,84,2); // centre line
    g.fillStyle(0xFFFFBB); g.fillCircle(ptx+16,pty-9,4); // ball
    // Paddles
    g.fillStyle(0xCC2222);g.fillRect(ptx+30,pty-18,11,14);
    g.fillStyle(0x884422);g.fillRect(ptx+33,pty-4,5,8);
    g.fillStyle(0x2222CC);g.fillRect(ptx-41,pty+4,11,14);

    // Noticeboard

      g.fillStyle(col);g.fillRect(nbx+nx,nby+ny,nw,nh);

    // Push pins

    // Sofa

      {x:ptx-58,y:pty},{x:ptx+58,y:pty},
      {x:ptx,y:pty-38},{x:ptx,y:pty+40},
      {x:sx+20,y:sy+14},{x:sx+60,y:sy+14},
    ];

  _buildThemeBits(){

  _unlockTheme(key){
    if(!key||key==='empty'||this.unlockedThemes[key])return;
    if(key==='clutter'||key==='dead'){this._addClutter(key);return;}
    const bit=this.themeBits[key];
    if(!bit)return;
    this.unlockedThemes[key]=true;
    this.tweens.add({targets:bit,alpha:1,duration:250,ease:'Linear'});

  // ── EMPLOYEES ──────────────────────────────────────
  _spawnEmployees(){
    for(let i=0;i<BASE_EMP;i++){
      const p=this.deskPool[i];
      const emp=new Employee(this,i,p.x,p.y+25);
      emp.setTarget(p.x,p.y+25);
      this.employees.push(emp);
      this.empGroup.add(emp.body);
    }

  // ── REDISTRIBUTE (AI target assignment) ────────────
  _redistribute(){
    if(this.over||this.qActive||this.workerActive)return;
    const active=this.employees.filter(e=>!e.isLeaving&&!e.departed);
    active.forEach((emp,i)=>{
      const r=Math.random();
      // Desk probability scales 0.10→0.75 with productivity (0→100)
      const deskChance=0.10+(emp.productivity/100)*0.65;
      if(r<deskChance){
        const d=this.deskPool[Math.min(emp.id,this.activeDeskCount-1)];
        emp.setTarget(d.x,d.y+25); emp.iconT.setText('💻');
      }else if(r<deskChance+0.12&&this.mtgSeats){
        const s=this.mtgSeats[i%this.mtgSeats.length];
        emp.setTarget(s.x,s.y); emp.iconT.setText('🗣️');
      }else if(r<deskChance+0.22&&this.breakSeats){
        const s=this.breakSeats[i%this.breakSeats.length];
        emp.setTarget(s.x,s.y); emp.iconT.setText('🏓');
      }else if(r<deskChance+0.38){
        const wz=this.wanderZones[Phaser.Math.Between(0,this.wanderZones.length-1)];
        emp.setTarget(wz.x+Phaser.Math.Between(-25,25),wz.y+Phaser.Math.Between(-20,20));
        emp.iconT.setText('');
      }else{
        emp.setTarget(30+Math.random()*140,HUD_H+320+Math.random()*100);
        emp.iconT.setText('💬');
      }
    });
  }

  _refreshHUD(){
    const a=this.employees.filter(e=>!e.isLeaving&&!e.departed), n=a.length;
    const avgH=n?a.reduce((s,e)=>s+e.happiness,0)/n:0;
    const avgP=n?a.reduce((s,e)=>s+e.productivity,0)/n:0;
    this.staffT.setText(`${n}/${this.curMaxEmp}`);
    this.staffT.setColor(n>4?C.tH:n>2?C.yH:C.rH);
    this.happyT.setText(`${Math.round(avgH)}%`);
    this.happyT.setColor(avgH>60?C.gH:avgH>30?C.yH:C.rH);
    this.prodT.setText(`${Math.round(avgP)}%`);
    this.prodT.setColor(avgP>60?C.oH:avgP>30?C.yH:C.rH);
    const m=Math.floor(this.timeLeft/60),s=this.timeLeft%60;
    this.timerT.setText(`${m}:${s.toString().padStart(2,'0')}`);
    this.timerT.setColor(this.timeLeft<=30?C.rH:this.timeLeft<=60?C.yH:'#FFF');
    this.hBar.setSize(Math.max(1,(avgH/100)*105),13);
    this.hBar.setFillStyle(avgH>60?C.green:avgH>30?C.yellow:C.red);
    this.pBar.setSize(Math.max(1,(avgP/100)*70),13);
    this.pBar.setFillStyle(avgP>60?C.orange:avgP>30?C.yellow:C.red);
    this.totalH+=avgH; this.totalP+=avgP; this.samples++;
    const grade=Math.round((avgH+avgP+n*8)/3);
    if(!this.officeT){
      this.officeT=this.add.text(GW-10,78,'',{fontFamily:"'Press Start 2P'",fontSize:'5px',color:C.gH}).setDepth(11).setOrigin(1,0);
    }
    this.officeT.setText(grade>=75?'CEO LEGEND':grade>=50?'GOOD PLACE':'CRISIS');
    this.officeT.setColor(grade>=75?C.gH:grade>=50?C.yH:C.rH);
    return{avgH,avgP,n};
  }

  _recordDecision(opt){
    const impact=opt.h+opt.p;
    const idx=this.choiceResults.length;
    this.choiceResults.push(impact);
    const col=impact>=18?C.green:impact>=0?C.yellow:C.red;
    if(this.decisionPips[idx]){
      this.decisionPips[idx].setFillStyle(col);
      this.tweens.add({targets:this.decisionPips[idx],scaleY:2,duration:120,yoyo:true,ease:'Sine.easeOut'});
    }
  }

  // ── GAME TICK ──────────────────────────────────────
  _tick(){
    if(this.over||this.qActive)return;
    this.timeLeft--; this.qTimer--;
    if(this.workerCooldown>0)this.workerCooldown--;
    const{avgH,avgP,n}=this._refreshHUD();
    this._checkLeaving();
    this._checkWorkman(avgH,avgP,n);
    if(this.qTimer<=0&&this.qIndex<this.qPool.length){
      this.qTimer=Q_INTERVAL; this._showQuestion(); return;
    }
    const alive=this.employees.filter(e=>!e.isLeaving&&!e.departed).length;
    if(alive===0){this._endGame(false);return;}
    if(this.timeLeft<=0){this._endGame(true);return;}
  }

  _checkLeaving(){
    this.employees.filter(e=>!e.isLeaving&&!e.departed&&e.happiness<20).forEach(emp=>{
      if(Math.random()<0.06){emp.startLeaving();this._float(emp.x,emp.y-30,'🚪 Resigned!',C.rH);}
    });
  }

  // ── WORKMAN ────────────────────────────────────────
  _checkWorkman(avgH,avgP,n){
    if(this.workerActive||this.workerCooldown>0)return;
    if(this.curMaxEmp>=MAX_EMP)return;
    if(avgH>=68&&avgP>=68){this.workerCooldown=55;this._spawnWorkman();}
  }

  _spawnWorkman(){
    this.workerActive=true;
    const slot=this.activeDeskCount, desk=this.deskPool[slot];
    if(!desk){this.workerActive=false;return;}
    this._float(GW/2,HUD_H+30,'🔨 New hire incoming!',C.gH);

    // Enter from bottom-left corner (desks are on left carpet zone)
    const wc=this.add.container(-20,GH-100).setDepth(8);
    const wg=this.add.graphics();
    // Hard hat
    wg.fillStyle(0xFFDD00);wg.fillRect(-5,-14,12,4);wg.fillRect(-6,-16,14,4);
    // Head
    wg.fillStyle(0xFFCFA0);wg.fillRect(-4,-10,8,8);
    wg.fillStyle(0);wg.fillRect(-2,-7,2,2);wg.fillRect(2,-7,2,2);wg.fillRect(-1,-3,4,1);
    // Hi-vis body
    wg.fillStyle(0xFF8800);wg.fillRect(-5,0,10,10);
    wg.fillStyle(0xFFFF00);wg.fillRect(-5,2,10,2);wg.fillRect(-5,7,10,2);
    // Arms + wrench
    wg.fillStyle(0xFF8800);wg.fillRect(-7,1,2,7);wg.fillRect(5,1,2,7);
    wg.fillStyle(0xFFCFA0);wg.fillRect(-7,7,2,2);wg.fillRect(5,7,2,2);
    wg.fillStyle(0xAAAAAA);wg.fillRect(5,7,2,8);wg.fillRect(3,7,6,3);
    // Legs
    wg.fillStyle(0x224499);wg.fillRect(-4,10,3,6);wg.fillRect(1,10,3,6);
    wg.fillStyle(0x111111);wg.fillRect(-5,15,4,2);wg.fillRect(0,15,4,2);
    wc.add(wg);
    wc.add(this.add.text(0,-28,'🔨',{fontSize:'12px'}).setOrigin(0.5));
    this.tweens.add({targets:wc,y:'+=3',duration:200,yoyo:true,repeat:-1});

    this.tweens.add({targets:wc,x:desk.x+30,duration:2200,ease:'Linear',onComplete:()=>{
      let cnt=0;
      const iv=setInterval(()=>{
        cnt++;
        this._float(desk.x+(Math.random()*40-20),desk.y+(Math.random()*30-15),
          ['🔨','⚙️','🪛','✨'][cnt%4],C.yH,9);
        if(cnt>=5){
          clearInterval(iv);
          // Reveal desk graphic
          const egi=slot-BASE_EMP;
          if(this.expDeskLayers[egi])this.tweens.add({targets:this.expDeskLayers[egi],alpha:1,duration:400});
          // Add collider for new desk
          const{x,y}=desk;
          const nb=this.add.rectangle(x,y-2,40,26,0,0).setVisible(false);
          this.physics.add.existing(nb,true); this.deskStatic.add(nb);
          this.activeDeskCount++; this.curMaxEmp++;
          setTimeout(()=>this._spawnNewEmp(slot),600);
          this.tweens.add({targets:wc,x:-40,duration:1800,ease:'Linear',
            onComplete:()=>{wc.destroy(true);this.workerActive=false;}});
        }
      },500);
    }});
  }

    const p=this.deskPool[deskIdx];

    const emp=new Employee(this,newId%EMP_T.length,-20,GH-80);

    const ic=this.add.text(W/2,midY-cardH/2+38,q.i,{fontSize:'28px'}).setOrigin(0.5);
    const qt=this.add.text(W/2,midY-cardH/2+80,q.t,{fontFamily:"'Press Start 2P'",fontSize:'9px',color:'#FFF',align:'center',wordWrap:{width:W-44}}).setOrigin(0.5,0);

    q.o.forEach((opt,idx)=>{
      const by=by0+idx*54, col=cols[idx];
      const btn=this.add.rectangle(W/2,by,W-44,46,col).setInteractive();
      const hTxt=`${opt.h>=0?'+':''}${opt.h}`;
      const pTxt=`${opt.p>=0?'+':''}${opt.p}`;
      const bt=this.add.text(W/2,by-6,opt.l,{fontFamily:"'Press Start 2P'",fontSize:'8px',color:'#FFF',wordWrap:{width:W-66},align:'center'}).setOrigin(0.5);
      const fx=this.add.text(W/2,by+13,`H ${hTxt}   P ${pTxt}`,{fontFamily:"'Press Start 2P'",fontSize:'6px',color:'#FFFFFF',stroke:'#000',strokeThickness:2}).setOrigin(0.5);
      btn.on('pointerdown',()=>{ui.destroy(true);this._applyChoice(opt);this.qActive=false;});
      btn.on('pointerover',()=>{const lc=Phaser.Display.Color.ValueToColor(col);lc.lighten(25);btn.setFillStyle(lc.color);});
      btn.on('pointerout',()=>btn.setFillStyle(col));
      ui.add([btn,bt,fx]);
    });
    this.tweens.add({targets:[card,border],scaleX:{from:0.85,to:1},scaleY:{from:0.85,to:1},duration:180,ease:'Back.easeOut'});
  }

  _applyChoice(opt){
    this.employees.filter(e=>!e.isLeaving&&!e.departed).forEach(emp=>{
      emp.applyEffect(opt.h+(Math.random()*8-4),opt.p+(Math.random()*8-4));
    });
    this._recordDecision(opt);
    this._impactBurst(opt);
    if(opt.h+opt.p>=15){
      this.goodChoices++;
      this._unlockTheme(opt.v);
    }else if(opt.h+opt.p<0){
      this._unlockTheme(opt.v);
    }else if(opt.v&&opt.v!=='empty'){
      this._unlockTheme(opt.v);
    }
    this._showFeedback(opt.m,opt.h+opt.p>=0);
    if(this.qIndex>=this.qPool.length){
      this.time.delayedCall(3600,()=>{if(!this.over)this._endGame(true);});
    }
  }

  _impactBurst(opt){
    const positive=opt.h+opt.p>=0;
    const col=positive?C.green:C.red;
    this.cameras.main.flash(120,positive?20:80,positive?160:10,positive?90:20);
    if(!positive)this.cameras.main.shake(120,0.006);
    const icons=positive?['+H','+P','✨','😊']:['-H','-P','!','😟'];
    for(let i=0;i<7;i++){
      this.time.delayedCall(i*55,()=>{
        this._float(
          Phaser.Math.Between(48,GW-48),
          Phaser.Math.Between(HUD_H+80,GH-130),
          icons[i%icons.length],
          positive?C.gH:C.rH,
          8
        );
      });
    }
  }

  _showFeedback(msg,positive){
    const fb=this.add.container(0,0).setDepth(25);
    const speaker=this._pickSpeaker();
    const bg=this.add.rectangle(GW/2,GH-104,GW-20,66,C.panel,0.96);
    bg.setStrokeStyle(2,positive?C.orange:C.red);
    const name=this.add.text(22,GH-132,speaker?`${speaker.empName}:`:'TEAM:',{fontFamily:"'Press Start 2P'",fontSize:'7px',color:positive?C.gH:C.rH});
    const txt=this.add.text(GW/2,GH-105,`"${msg}"`,{fontFamily:"'Press Start 2P'",fontSize:'8px',color:'#FFF',wordWrap:{width:GW-44},align:'center'}).setOrigin(0.5);
    if(speaker)this._float(speaker.x,speaker.y-42,'💬',positive?C.gH:C.rH,11);
    fb.add([bg,name,txt]);
    this.time.delayedCall(2600,()=>this.tweens.add({targets:fb,alpha:0,duration:400,onComplete:()=>fb.destroy(true)}));
  }

  _pickSpeaker(){
    const active=this.employees.filter(e=>!e.isLeaving&&!e.departed);
    return active.length?active[Phaser.Math.Between(0,active.length-1)]:null;
  }

  _float(x,y,msg,color,sz=9){
    const t=this.add.text(x,y,msg,{fontFamily:"'Press Start 2P'",fontSize:`${sz}px`,color}).setOrigin(0.5).setDepth(28);
    this.tweens.add({targets:t,y:y-50,alpha:0,duration:1500,onComplete:()=>t.destroy()});
  }

  _endGame(won){
    this.over=true;
    const a=this.employees.filter(e=>!e.isLeaving&&!e.departed);
    const avgH=this.samples?this.totalH/this.samples:0;
    const avgP=this.samples?this.totalP/this.samples:0;
    const score=Math.round((avgH*0.4+avgP*0.4+(a.length/MAX_EMP)*100)*(won?1:0.5));
    this.time.delayedCall(1200,()=>this.scene.start('End',{won,score,avgH:Math.round(avgH),avgP:Math.round(avgP),retained:a.length,avatarIndex:this.avatarIndex}));
  }

  update(time,delta){
    if(this.over)return;
    this.employees=this.employees.filter(emp=>!emp.update(time,delta));
  }
}

// ═══════════════════════════════════════════════════════
//  END SCENE
// ═══════════════════════════════════════════════════════
class EndScene extends Phaser.Scene{
  constructor(){super('End')}
  init(d){this.won=d.won;this.score=d.score;this.avgH=d.avgH;this.avgP=d.avgP;this.retained=d.retained;this.ai=d.avatarIndex;}
  create(){
    const W=GW,H=GH,av=AVATARS[this.ai];
    this.add.rectangle(W/2,H/2,W,H,C.dark);
    const gr=this.add.graphics();gr.lineStyle(1,0x1A1A2E,0.4);
    for(let x=0;x<=W;x+=16)gr.lineBetween(x,0,x,H);
    for(let y=0;y<=H;y+=16)gr.lineBetween(0,y,W,y);
    this.add.rectangle(W/2,0,W,4,this.won?C.green:C.red).setOrigin(0.5,0);
    const legend=this.score>=85, good=this.score>=55;
    const tc=legend?C.gH:good?C.yH:C.rH;
    const title=legend?'🤩 CEO LEGEND':good?'🙂 GOOD WORKPLACE':'😟 WORKPLACE CRISIS';
    const sub=legend?'Best CEO ever!':good?'This is a pretty good place.':'I might look for another job...';
    this.add.text(W/2,62,title,{fontFamily:"'Press Start 2P'",fontSize:'18px',color:tc,stroke:'#000',strokeThickness:5}).setOrigin(0.5);
    this.add.text(W/2,100,sub,{fontFamily:"'Press Start 2P'",fontSize:'8px',color:'#888899',align:'center',wordWrap:{width:W-34}}).setOrigin(0.5);
    const sc=this.score>=70?C.gH:this.score>=40?C.yH:C.rH;
    this.add.text(W/2,148,'YOUR SCORE',{fontFamily:"'Press Start 2P'",fontSize:'9px',color:'#555566'}).setOrigin(0.5);
    const st=this.add.text(W/2,195,`${this.score}`,{fontFamily:"'Press Start 2P'",fontSize:'56px',color:sc,stroke:'#000',strokeThickness:7}).setOrigin(0.5);
    this.tweens.add({targets:st,scaleX:1.08,scaleY:1.08,duration:700,yoyo:true,repeat:-1});
    const rk=this.score>=88?'S RANK — LEGENDARY CEO! 🌟':this.score>=72?'A RANK — GREAT LEADER! 💪':this.score>=56?'B RANK — SOLID MANAGER':this.score>=40?'C RANK — NEEDS WORK...':'D RANK — FIRE YOURSELF 😬';
    this.add.text(W/2,248,rk,{fontFamily:"'Press Start 2P'",fontSize:'8px',color:sc}).setOrigin(0.5);
    const pY=278;
    this.add.rectangle(W/2,pY+75,W-30,150,C.darkMid).setOrigin(0.5,0);
    this.add.rectangle(W/2,pY+75,W-30,150,0,0).setStrokeStyle(2,0x333355).setOrigin(0.5,0);
    [{label:'😊 Avg Happiness',val:`${this.avgH}%`,col:this.avgH>60?C.gH:C.rH},{label:'⚡ Avg Productivity',val:`${this.avgP}%`,col:this.avgP>60?C.oH:C.rH},{label:'👥 Staff Retained',val:`${this.retained}/${MAX_EMP}`,col:this.retained>4?C.tH:C.rH}].forEach((s,i)=>{
      const sy=pY+95+i*40;
      this.add.text(24,sy,s.label,{fontFamily:"'Press Start 2P'",fontSize:'7px',color:'#666677'});
      this.add.text(W-24,sy+2,s.val,{fontFamily:"'Press Start 2P'",fontSize:'11px',color:s.col}).setOrigin(1,0);
      if(i<2){const dv=this.add.graphics();dv.lineStyle(1,0x222233);dv.lineBetween(20,sy+32,W-20,sy+32);}
    });
    const btn=this.add.rectangle(W/2,H-95,265,52,C.orange).setInteractive();
    this.add.text(W/2,H-95,'▶  PLAY AGAIN',{fontFamily:"'Press Start 2P'",fontSize:'12px',color:'#FFF'}).setOrigin(0.5).setDepth(1);
    this.tweens.add({targets:btn,alpha:0.75,duration:900,yoyo:true,repeat:-1});
    btn.on('pointerdown',()=>this.scene.start('AvatarSelect'));
    btn.on('pointerover',()=>btn.setFillStyle(C.orangeLt));
    btn.on('pointerout',()=>btn.setFillStyle(C.orange));
    const cg=this.add.graphics().setDepth(5);
    drawCEOPerson(cg,W-38,H-48,2,av.suit,av.skin,av.hair);
    this.tweens.add({targets:cg,y:'-=4',duration:550,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.add.rectangle(W/2,H-20,W,40,C.darkMid);
    this.add.text(W/2,H-20,'holidayextras.com',{fontFamily:"'Press Start 2P'",fontSize:'6px',color:'#333355'}).setOrigin(0.5);
  }
}

  });
});
